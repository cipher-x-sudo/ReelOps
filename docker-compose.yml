services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: reelops
      POSTGRES_USER: reelops
      POSTGRES_PASSWORD: reelops
    ports:
      - "5437:5432"
    volumes:
      - reelops-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U reelops -d reelops"]
      interval: 5s
      timeout: 5s
      retries: 20

  reelops:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: postgresql+psycopg://reelops:reelops@postgres:5432/reelops
      ARTIFACTS_DIR: /app/artifacts
      NICHES_DIR: /app/niches
      NICHE_CONFIGS_DIR: /app/configs/niches
    volumes:
      - ./artifacts:/app/artifacts
      - ./configs/niches:/app/configs/niches
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  reelops-postgres:
